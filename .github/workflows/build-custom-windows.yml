name: Build customized Codex for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "codex-rs/**"
      - ".github/workflows/build-custom-windows.yml"

permissions:
  contents: read

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: codex-rs

    env:
      CARGO_PROFILE_RELEASE_LTO: "false"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Codex CLI
        run: >-
          cargo build
          --locked
          --release
          --target x86_64-pc-windows-msvc
          --bin codex

      - name: Verify executable
        run: .\target\x86_64-pc-windows-msvc\release\codex.exe --version

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-x64-custom
          path: codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
          if-no-files-found: error
          retention-days: 14
